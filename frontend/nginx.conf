server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip for faster delivery of JS/CSS bundles
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    application/xml+rss text/javascript;
    gzip_min_length 1024;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy → FastAPI backend ───────────────────────
    # BACKEND_URL_PLACEHOLDER is hard-replaced by docker-entrypoint-custom.sh.
    # In ACA, the backend FQDN points to a static internal LB IP, so we don't
    # need dynamic DNS re-resolution via nginx variables, which breaks headers.
    
    location /api/ {
        proxy_pass         BACKEND_URL_PLACEHOLDER;
        proxy_http_version 1.1;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        proxy_next_upstream   error timeout http_502 http_503 http_504;
        proxy_next_upstream_timeout 15s;
        proxy_next_upstream_tries   3;
    }

    location /health {
        proxy_pass         BACKEND_URL_PLACEHOLDER/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    location /openapi.json {
        proxy_pass         BACKEND_URL_PLACEHOLDER/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   Connection        "";
    }

    # ── Static assets — long-lived cache (Vite content-hashes them) ─
    location ~* \.(js|css|png|svg|ico|woff2?|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # ── SPA fallback — all unknown routes serve index.html ────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
