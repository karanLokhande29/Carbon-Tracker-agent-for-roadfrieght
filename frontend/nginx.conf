server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip for faster delivery of JS/CSS bundles
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    application/xml+rss text/javascript;
    gzip_min_length 1024;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy → FastAPI backend ───────────────────────
    # Mirrors the vite dev-server proxy configured in vite.config.ts
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass         http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Static assets — long-lived cache (Vite content-hashes them) ─
    location ~* \.(js|css|png|svg|ico|woff2?|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # ── SPA fallback — all unknown routes serve index.html ────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
