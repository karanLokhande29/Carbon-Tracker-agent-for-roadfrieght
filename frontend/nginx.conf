server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip for faster delivery of JS/CSS bundles
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    application/xml+rss text/javascript;
    gzip_min_length 1024;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy → FastAPI backend ───────────────────────
    # Uses a variable so Nginx doesn't resolve the upstream at startup.
    # Works in both Docker Compose (backend:8000) and Azure Container Apps.
    # 168.63.129.16 = Azure internal DNS; 127.0.0.11 = Docker embedded DNS.
    resolver 127.0.0.11 168.63.129.16 8.8.8.8 valid=30s ipv6=off;

    location /api/ {
        set $backend_upstream "http://backend:8000";
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "close";
        proxy_read_timeout 120s;

        # Required for Azure Container Apps internal HTTPS ingress
        proxy_ssl_verify       off;
        proxy_ssl_server_name  on;
    }

    location /health {
        set $backend_upstream "http://backend:8000";
        proxy_pass         $backend_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $proxy_host;
        proxy_set_header   Connection "close";

        proxy_ssl_verify       off;
        proxy_ssl_server_name  on;
    }

    # ── Static assets — long-lived cache (Vite content-hashes them) ─
    location ~* \.(js|css|png|svg|ico|woff2?|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # ── SPA fallback — all unknown routes serve index.html ────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
