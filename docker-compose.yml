# ─────────────────────────────────────────────────────────────────────────────
# Named volumes — model / data artefacts live here and are NOT rebuilt
# every time you redeploy the container.
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  backend_models:
  backend_data:
  redis_data:

services:

  # ── Redis cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    # In CI, BACKEND_IMAGE env var is set to carbon-tracker-backend:ci
    # so the pre-built image is reused without a second docker build.
    image: ${BACKEND_IMAGE:-carbon-tracker-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env          # real secrets — never committed
    environment:
      # Override redis URL so it points to the compose service, not localhost
      REDIS_URL: redis://redis:6379
      PYTHONUNBUFFERED: "1"
      # Ensure model / data paths resolve inside the container
      MODEL_DIR: /app/models
      DATA_DIR: /app/data
    volumes:
      # Bind-mount your local models/ and data/ so the container picks up
      # updated artefacts without a rebuild.
      # rw (not ro) so CI stub files written before compose-up are visible.
      - ./backend/models:/app/models
      - ./backend/data:/app/data:ro
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s    # TFT can take ~45 s to load

  # ── React / Vite → Nginx frontend ─────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-carbon-tracker-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 20s
      timeout: 5s
      retries: 3
