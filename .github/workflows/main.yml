name: build-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build backend image ──────────────────────────────────────────────
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: carbon-tracker-backend:ci
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── 3. Build frontend image ─────────────────────────────────────────────
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: carbon-tracker-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          build-args: |
            VITE_API_BASE_URL=

      # ── 4. Verify required artifact files are present ───────────────────────
      - name: Verify required artifact files are present
        run: |
          echo "── Checking source files ──"
          test -f backend/Dockerfile          && echo "✅ backend/Dockerfile"
          test -f backend/requirements.txt    && echo "✅ backend/requirements.txt"
          test -f backend/.env.example        && echo "✅ backend/.env.example"
          test -f frontend/Dockerfile         && echo "✅ frontend/Dockerfile"
          test -f frontend/package.json       && echo "✅ frontend/package.json"
          test -f frontend/nginx.conf         && echo "✅ frontend/nginx.conf"
          test -f docker-compose.yml          && echo "✅ docker-compose.yml"
          test -f .github/workflows/main.yml  && echo "✅ .github/workflows/main.yml"

          echo "── Checking data files ──"
          test -f backend/data/lane_metadata.json      && echo "✅ lane_metadata.json"
          test -f backend/data/city_coordinates.json   && echo "✅ city_coordinates.json"
          test -f backend/data/anomaly_data.json       && echo "✅ anomaly_data.json"
          test -f backend/data/scaler_params.json      && echo "✅ scaler_params.json"
          test -f backend/data/model_config.json       && echo "✅ model_config.json"

          echo "✅ All required files present"

      # ── 5. Start containers ─────────────────────────────────────────────────
      - name: Start containers
        run: |
          # Write a minimal .env so the backend can start without real model files
          cat > backend/.env <<'EOF'
          HOST=0.0.0.0
          PORT=8000
          REDIS_URL=redis://redis:6379
          MODEL_DIR=models
          DATA_DIR=data
          CATBOOST_MODEL_PATH=models/catboost_best.cbm
          HYBRID_MODEL_PATH=models/hybrid_graphsage_catboost_best.cbm
          TFT_CKPT_PATH=models/tft_best-82-0.1107.ckpt
          EMBEDDINGS_PATH=models/city_embeddings_1.npy
          CACHE_TTL_PREDICT=300
          CACHE_TTL_STATIC=3600
          LOW_CONFIDENCE_THRESHOLD_KG=1000.0
          VIRTUAL_ENSEMBLE_COUNT=10
          EOF

          # Override image names so compose uses the ones we just built
          export BACKEND_IMAGE=carbon-tracker-backend:ci
          export FRONTEND_IMAGE=carbon-tracker-frontend:ci

          # Start only redis + backend (frontend not needed for API smoke tests)
          docker compose up -d redis backend
          echo "✅ Containers started"

      # ── 6. Wait for backend /health ─────────────────────────────────────────
      - name: Wait for backend /health
        run: |
          echo "Waiting for backend to become healthy…"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy after ${i} attempt(s)"
              exit 0
            fi
            echo "  attempt $i — HTTP $STATUS — retrying in 5s…"
            sleep 5
          done
          echo "❌ Backend did not become healthy in 150s"
          exit 1

      # ── 7. Smoke-test backend endpoints ─────────────────────────────────────
      - name: Smoke-test backend endpoints
        run: |
          BASE=http://localhost:8000

          check() {
            local url=$1 expected=$2 label=$3
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
            if [ "$code" = "$expected" ]; then
              echo "✅ $label → HTTP $code"
            else
              echo "❌ $label → expected HTTP $expected, got HTTP $code"
              exit 1
            fi
          }

          # Health + model readiness
          check "$BASE/health"            "200" "GET /health"

          # OpenAPI schema (confirms FastAPI is wired correctly)
          check "$BASE/openapi.json"      "200" "GET /openapi.json"

          # Lanes list (confirms DB/data files loaded)
          check "$BASE/api/lanes"         "200" "GET /api/lanes"

          # Analytics endpoints
          check "$BASE/api/analytics/anomalies"         "200" "GET /api/analytics/anomalies"
          check "$BASE/api/analytics/vehicle-breakdown" "200" "GET /api/analytics/vehicle-breakdown"
          check "$BASE/api/analytics/model-metrics"     "200" "GET /api/analytics/model-metrics"

          echo "✅ All smoke tests passed"

      # ── 8. Dump container logs (on failure) ─────────────────────────────────
      - name: Dump container logs (on failure)
        if: failure()
        run: |
          echo "═══ Backend logs ═══"
          docker compose logs backend || true
          echo "═══ Redis logs ═══"
          docker compose logs redis   || true

      # ── 9. Shutdown containers ───────────────────────────────────────────────
      - name: Shutdown containers
        if: always()
        run: docker compose down -v
