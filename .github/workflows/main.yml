name: build-test-deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: carbon-tracker-backend
  FRONTEND_IMAGE: carbon-tracker-frontend

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: Build & Test (runs on every push and PR)
  # ════════════════════════════════════════════════════════════════════════════
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Build images ────────────────────────────────────────────────────────
      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:ci \
            -f backend/Dockerfile \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ env.FRONTEND_IMAGE }}:ci \
            -f frontend/Dockerfile \
            --build-arg VITE_API_BASE_URL="" \
            ./frontend

      # ── Verify artifact files ───────────────────────────────────────────────
      - name: Verify required artifact files
        run: |
          set -e
          check() { test -f "$1" && echo "OK: $1" || { echo "MISSING: $1"; exit 1; }; }
          check backend/Dockerfile
          check backend/requirements.txt
          check backend/.env.example
          check frontend/Dockerfile
          check frontend/package.json
          check frontend/nginx.conf
          check docker-compose.yml
          check .github/workflows/main.yml
          check backend/data/lane_metadata.json
          check backend/data/city_coordinates.json
          check backend/data/anomaly_data.json
          check backend/data/scaler_params.json
          check backend/data/model_config.json
          echo "All required files present"

      # ── Start containers for smoke testing ──────────────────────────────────
      - name: Start containers
        run: |
          set -e

          printf '%s\n' \
            'HOST=0.0.0.0' \
            'PORT=8000' \
            'REDIS_URL=redis://redis:6379' \
            'MODEL_DIR=models' \
            'DATA_DIR=data' \
            'CATBOOST_MODEL_PATH=models/catboost_best.cbm' \
            'HYBRID_MODEL_PATH=models/hybrid_graphsage_catboost_best.cbm' \
            'TFT_CKPT_PATH=models/tft_best-82-0.1107.ckpt' \
            'EMBEDDINGS_PATH=models/city_embeddings_1.npy' \
            'CACHE_TTL_PREDICT=300' \
            'CACHE_TTL_STATIC=3600' \
            'LOW_CONFIDENCE_THRESHOLD_KG=1000.0' \
            'VIRTUAL_ENSEMBLE_COUNT=10' \
            'CI_MODE=true' \
            > backend/.env

          export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:ci
          export FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:ci

          docker compose up -d redis
          sleep 3
          docker compose up -d backend
          echo "Containers started"

      # ── Health check ────────────────────────────────────────────────────────
      - name: Wait for backend /health
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy after ${i} attempt(s)"
              exit 0
            fi
            echo "  attempt $i/30 - HTTP $STATUS - retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Backend did not become healthy within 150s"
          exit 1

      # ── Smoke tests ────────────────────────────────────────────────────────
      - name: Smoke-test backend endpoints
        run: |
          set -e
          BASE=http://localhost:8000

          check() {
            local url="$1" expected="$2" label="$3"
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
            if [ "$code" = "$expected" ]; then
              echo "PASS: $label - HTTP $code"
            else
              echo "FAIL: $label - expected HTTP $expected, got HTTP $code"
              exit 1
            fi
          }

          check "$BASE/health"                           "200" "GET /health"
          check "$BASE/openapi.json"                     "200" "GET /openapi.json"
          check "$BASE/api/lanes"                        "200" "GET /api/lanes"
          check "$BASE/api/analytics/anomalies"          "200" "GET /api/analytics/anomalies"
          check "$BASE/api/analytics/vehicle-breakdown"  "200" "GET /api/analytics/vehicle-breakdown"
          check "$BASE/api/analytics/model-metrics"      "200" "GET /api/analytics/model-metrics"

          echo "All smoke tests passed"

      # ── Cleanup ─────────────────────────────────────────────────────────────
      - name: Dump container logs (on failure)
        if: failure()
        run: |
          echo "=== backend logs ==="
          docker compose logs --no-color backend || true
          echo "=== redis logs ==="
          docker compose logs --no-color redis   || true

      - name: Shutdown containers
        if: always()
        run: docker compose down -v --remove-orphans

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: Push to ACR + Deploy to Azure (only on main branch push)
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Push to ACR & Deploy
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Login to Azure ──────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Login to ACR ────────────────────────────────────────────────────────
      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── Build & Push Backend ────────────────────────────────────────────────
      - name: Build & Push Backend to ACR
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}
          SHA_TAG=${GITHUB_SHA::8}

          docker build \
            -t $IMAGE:latest \
            -t $IMAGE:$SHA_TAG \
            -f backend/Dockerfile \
            ./backend

          docker push $IMAGE:latest
          docker push $IMAGE:$SHA_TAG

          echo "Pushed: $IMAGE:latest and $IMAGE:$SHA_TAG"

      # ── Build & Push Frontend ───────────────────────────────────────────────
      - name: Build & Push Frontend to ACR
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}
          SHA_TAG=${GITHUB_SHA::8}

          docker build \
            -t $IMAGE:latest \
            -t $IMAGE:$SHA_TAG \
            -f frontend/Dockerfile \
            --build-arg VITE_API_BASE_URL="" \
            ./frontend

          docker push $IMAGE:latest
          docker push $IMAGE:$SHA_TAG

          echo "Pushed: $IMAGE:latest and $IMAGE:$SHA_TAG"

      # ── Deploy Backend to Container Apps ────────────────────────────────────
      - name: Deploy Backend
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ secrets.AZURE_RG }}
          containerAppName: ${{ secrets.BACKEND_APP_NAME }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest

      # ── Deploy Frontend to Container Apps ───────────────────────────────────
      - name: Deploy Frontend
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ secrets.AZURE_RG }}
          containerAppName: ${{ secrets.FRONTEND_APP_NAME }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:latest

      # ── Verify deployment ───────────────────────────────────────────────────
      - name: Verify deployment health
        run: |
          echo "Waiting 30s for new revisions to become active..."
          sleep 30

          FRONTEND_FQDN=$(az containerapp show \
            --name ${{ secrets.FRONTEND_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Frontend URL: https://${FRONTEND_FQDN}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${FRONTEND_FQDN}" 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Deployment verified - HTTP $STATUS"
          else
            echo "WARNING: Frontend returned HTTP $STATUS (may still be starting)"
          fi

      # ── Azure logout ────────────────────────────────────────────────────────
      - name: Azure Logout
        if: always()
        run: az logout
