name: CI/CD — Build & Push to ACR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # build-only on PRs (no push)

# ── Concurrency: cancel in-progress runs on the same branch ──────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE:  carbon-tracker-backend
  FRONTEND_IMAGE: carbon-tracker-frontend

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & basic sanity checks
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python — check syntax (backend)
        run: |
          python3 -m py_compile backend/run.py
          find backend/app -name "*.py" | xargs python3 -m py_compile
          echo "✅ Python syntax OK"

      - name: Node — install & lint (frontend)
        working-directory: frontend
        run: |
          npm ci --prefer-offline
          npm run lint --if-present || echo "⚠️  Lint warnings present (non-blocking)"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build & push backend image to ACR
  # ────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend → ACR
    runs-on: ubuntu-latest
    needs: lint
    # Only push on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Docker layer cache (GitHub Actions Cache) ────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Log in to ACR via service principal credentials ──────────────────
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── Build & push with layer caching ──────────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Tag with both :latest and :<commit-sha> for traceability
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          # GitHub Actions cache — dramatically speeds up repeated builds
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
          # Build args (no sensitive values here)
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build & push frontend image to ACR
  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend → ACR
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          build-args: |
            VITE_API_BASE_URL=

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Summary (runs after both builds succeed)
  # ────────────────────────────────────────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always()
    steps:
      - name: Report result
        run: |
          echo "## CI/CD Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| carbon-tracker-backend  | ${{ github.sha }} | ${{ needs.build-backend.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| carbon-tracker-frontend | ${{ github.sha }} | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
